<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Campus Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#f5e6ff,#dbeafe);
}

.chat-container{
    width:450px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.header{
    background:#a78bfa;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.chat-box{
    height:500px;
    overflow-y:auto;
    padding:15px;
}

.bot{
    background:#f3f4f6;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
}

.user{
    background:#c4b5fd;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    text-align:right;
}

.input-area{
    display:flex;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
}

button{
    padding:12px 20px;
    border:none;
    background:#a78bfa;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">
🎓 Smart Campus Assistant
</div>

<div class="chat-box" id="chatBox">

<div class="bot">
👋 Welcome to Smart Campus Assistant.<br><br>

You can ask about:<br>
🏫 Campus<br>
📚 Courses<br>
📝 Admission<br>
💰 Fees<br>
🏢 Facilities<br>
💼 Placements<br>
📞 Contact
</div>

</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask a question...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("userInput");
let message = input.value.toLowerCase().trim();

if(message === "") return;

let chatBox = document.getElementById("chatBox");

chatBox.innerHTML += `<div class="user">${input.value}</div>`;

let response = "";

if(message.includes("hi") || message.includes("hello") || message.includes("hey")){

response = "👋 Hello! How can I help you today?";

}

else if(message.includes("campus") || message.includes("about")){

response = `
🏫 <b>About Our Campus</b><br><br>

Our campus provides quality education, modern classrooms,
digital library, computer labs, hostel facilities,
sports complex, placement support and experienced faculty.
`;

}

else if(message.includes("course")){

response = `
📚 <b>Courses Offered</b><br><br>

• BCA<br>
• BBA<br>
• B.Com<br>
• MBA<br>
• MCA
`;

}

else if(message.includes("admission")){

response = `
📝 <b>Admission Process</b><br><br>

1. Fill application form<br>
2. Upload documents<br>
3. Pay application fee<br>
4. Verification<br>
5. Admission confirmation
`;

}

else if(message.includes("fee")){

response = `
💰 <b>Fee Structure</b><br><br>

BCA : ₹50,000 / Year<br>
BBA : ₹45,000 / Year<br>
B.Com : ₹40,000 / Year<br>
MBA : ₹1,20,000 / Year<br>
MCA : ₹90,000 / Year
`;

}

else if(
message.includes("facility") ||
message.includes("facilities") ||
message.includes("hostel") ||
message.includes("library") ||
message.includes("wifi")
){

response = `
🏢 <b>Campus Facilities</b><br><br>

📚 Digital Library<br>
💻 Computer Labs<br>
📶 High-Speed Wi-Fi<br>
🏠 Hostel Facility<br>
🏀 Sports Complex<br>
🍽 Cafeteria<br>
🚌 Transportation
`;

}

else if(message.includes("placement")){

response = `
💼 <b>Placements</b><br><br>

Top Recruiters:<br>
• TCS<br>
• Infosys<br>
• Wipro<br>
• Accenture<br><br>

Highest Package: ₹12 LPA<br>
Average Package: ₹4.5 LPA
`;

}

else if(message.includes("contact")){

response = `
📞 <b>Contact Information</b><br><br>

Phone: +91 9876543210<br>
Email: info@college.com
`;

}

else{

response = `
❌ Sorry, I didn't understand.

Please ask about:
🏫 Campus<br>
📚 Courses<br>
📝 Admission<br>
💰 Fees<br>
🏢 Facilities<br>
💼 Placements<br>
📞 Contact
`;

}

chatBox.innerHTML += `<div class="bot">${response}</div>`;

input.value = "";
chatBox.scrollTop = chatBox.scrollHeight;

}

document.getElementById("userInput").addEventListener("keypress", function(event){
if(event.key === "Enter"){
sendMessage();
}
});

</script>

</body>
</html>
